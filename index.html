<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
      <div class="logo-text">
        <img src="img/odin.png" alt="The Odin Project logo">
        <div class="text">Odin</div>
      </div>
      
      <div class="credit">
        Photo by <a href="https://unsplash.com/@haliewestphoto">Haile West</a> on <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA">Unsplash</a>
      </div>
    </header>

    <div class="right">
      <div class="right-top">
        <div>
          <div>
            This is not a real online service! 
            You know you need something like this in your life to realize your deepest dreams.
          </div>
          <div>
            Sign up <i>now</i> to get started.
          </div>
        </div>

        <div>You know you want to.</div>
      </div>

      <form action="" method="post" id="sign-up">
        <fieldset>
          <div class="form-row title">Let's do this</div>
        
          <div class="form-row">
            <div class="inputPair">
              <label for="first-name">FIRST NAME</label>
              <input type="text" id="first-name" name="first-name">
            </div>

            <div class="inputPair">
              <label for="last-name">LAST NAME</label>
              <input type="text" id="last-name" name="last-name">
            </div>
          </div>

          <div class="form-row">
            <div class="inputPair">
              <label for="mail">EMAIL</label>
              <input type="email" id="mail" name="email">
            </div>

            <div class="inputPair">
              <label for="phone">PHONE NUMBER</label>
              <input type="tel" id="phone" name="phone-number">
            </div>
          </div>

          <div class="form-row">
            <div class="inputPair">
              <label for="pass">PASSWORD</label>
              <input type="password" id="pass" name="password">
            </div>

            <div class="inputPair">
              <label for="pass-confirm">CONFIRM PASSWORD</label>
              <input type="password" id="pass-confirm">
            </div>
          </div>
        </fieldset>

        <div class="right-bottom">
          <button type="submit">Create Account</button>
          <div class="log-in">
            Already have an account? 
            <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1">Log In.</a>
          </div>
        </div>
      </form>


    </div>
  </body>
</html>
